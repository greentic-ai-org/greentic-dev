name: CI
on:
  workflow_call:
  pull_request:
    branches: [main]
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: greenticai/.github/.github/workflows/pr-ci.yml@main
    with:
      variant: host

  # pack-smoke moved to nightly.yml (plans/binary-bifurcation.md Phase A).
  # The job installs delegated tool binaries and runs a workspace release
  # build — ~40 minutes on every PR is too expensive for the signal (release
  # build regression is rare and already covered by weekly-stable cuts).
