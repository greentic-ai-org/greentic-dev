name: Nightly

# Nightly full build/test/coverage + release-mode pack-smoke. Gate + notify
# pattern per plans/binary-bifurcation.md Phase A.7.

on:
  schedule:
    # 03:50 UTC — inside the 03:00-03:59 UTC nightly window per A.7.2
    # (custom/heavy nightlies 03:35-03:59).
    - cron: "50 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.gate.outputs.should-run }}
    steps:
      - id: gate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW: ${{ github.workflow }}
          HEAD_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          emit() {
            local should_run="$1"
            local reason="$2"
            echo "should-run=${should_run}" >> "${GITHUB_OUTPUT}"
            {
              echo "## Nightly gate"
              echo ""
              echo "- **Event:** \`${EVENT_NAME}\`"
              echo "- **Workflow:** \`${WORKFLOW}\`"
              echo "- **HEAD:** \`${HEAD_SHA}\`"
              echo "- **Decision:** \`${should_run}\` — ${reason}"
            } >> "${GITHUB_STEP_SUMMARY}"
            echo "gate: should-run=${should_run} (${reason})"
          }

          if [ "${EVENT_NAME}" != "schedule" ]; then
            emit true "non-schedule event (${EVENT_NAME:-unknown}) always runs"
            exit 0
          fi

          last_sha=$(gh run list \
            --repo "${REPO}" \
            --workflow "${WORKFLOW}" \
            --status success \
            --event schedule \
            --limit 1 \
            --json headSha \
            --jq '.[0].headSha // ""' 2>/dev/null || echo "")

          if [ -z "${last_sha}" ]; then
            emit true "no prior successful scheduled run — establishing baseline"
            exit 0
          fi

          if [ "${last_sha}" = "${HEAD_SHA}" ]; then
            emit false "unchanged since last successful scheduled run (${last_sha})"
            exit 0
          fi

          emit true "changed since last successful scheduled run (${last_sha} → ${HEAD_SHA})"

  nightly:
    needs: gate
    if: needs.gate.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Use Rust 1.95.0
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          toolchain: 1.95.0

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install required binary tools via binstall
        run: |
          cargo binstall --locked -y tomlq
          cargo binstall --locked -y cargo-llvm-cov
          cargo binstall --locked -y cargo-nextest

      - name: Build + Test (full, conformance on)
        run: |
          cargo build --workspace --locked --all-features
          cargo run -p greentic-dev --locked -- install tools --latest
          GOLDEN_ACCEPT=0 cargo test --workspace --locked --all-features

      - name: Coverage policy (nightly)
        run: bash ci/coverage.sh

      - name: Validate all example flows (dry run)
        run: |
          if ls examples/flows/*.yaml >/dev/null 2>&1; then
            for f in examples/flows/*.yaml; do
              echo "Validating $f"
              cargo run -p greentic-dev -- run -f "$f" --validate-only
            done
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-artifacts
          path: |
            .greentic/transcripts
            target/coverage/**
            target/**/*.dSYM
          if-no-files-found: ignore

  # Release-mode pack-smoke gate. Moved off ci.yml (PR-time) per
  # plans/binary-bifurcation.md Phase A — the ~40-minute release build
  # gave thin signal on every PR. Kept as a sibling nightly job so the
  # release path still gets a daily verification; `workflow_dispatch`
  # above makes it manually re-runnable.
  pack-smoke:
    needs: gate
    if: needs.gate.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CARGO_TERM_COLOR: always
      RUSTUP_TOOLCHAIN: "1.95.0"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - name: Install delegated tool binaries via greentic-dev
        run: cargo run -p greentic-dev --locked -- install tools --latest
      - name: Release build (pack smoke)
        run: cargo build --workspace --locked --release
