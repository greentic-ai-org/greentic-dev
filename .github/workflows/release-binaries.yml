name: Release Binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    uses: greenticai/.github/.github/workflows/release-binaries.yml@main
    with:
      package: greentic-dev
      binary: greentic-dev
      extra-files: |
        README.md
        LICENSE-MIT
        LICENSE-APACHE
    secrets: inherit

  publish_crates:
    name: Publish to crates.io
    needs: [release]
    permissions:
      contents: read
    uses: greenticai/.github/.github/workflows/crates-publish.yml@main
    with:
      crates: "greentic-dev"
    secrets: inherit
